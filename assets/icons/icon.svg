<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#2a1a5e"/>
      <stop offset="60%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#050714"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ff66c4"/>
      <stop offset="100%" stop-color="#66ccff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(255,215,0,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Background sparkles -->
  <circle cx="80"  cy="100" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="430" cy="80"  r="2" fill="#fff" opacity="0.7"/>
  <circle cx="120" cy="380" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="420" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="60"  cy="280" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="450" cy="250" r="2" fill="#ff66c4" opacity="0.8"/>

  <!-- Glow behind star -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Main star -->
  <path d="M 256 100
           L 296 220
           L 420 220
           L 320 295
           L 360 415
           L 256 340
           L 152 415
           L 192 295
           L 92  220
           L 216 220 Z"
        fill="url(#star)"
        stroke="#fff"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Inner sparkle -->
  <circle cx="256" cy="256" r="14" fill="#fff" opacity="0.95"/>
</svg>
