# Cloudflare Worker config for the English Star Quest AI proxy.
# Deploy with: cd backend && npx wrangler deploy
#
# Before first deploy:
#   1. npx wrangler login                                  (browser login to Cloudflare)
#   2. npx wrangler secret put ANTHROPIC_API_KEY           (paste your Claude API key)
#   3. npx wrangler kv namespace create USAGE              → copy the id into [[kv_namespaces]] below
#   4. npx wrangler kv namespace create CACHE              → copy the id into [[kv_namespaces]] below
#   5. npx wrangler deploy
#
# After deploy you'll get a URL like https://english-star-quest-ai.<your>.workers.dev
# Put that into the frontend at index.html → window.AI_ENDPOINT = "https://.../api"

name = "english-star-quest-ai"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Daily cost cap in US cents — COMBINED across all providers (Claude + OpenAI).
# Phase C (premium voice): 200 = $2/day → ~$60/month max if used every day.
# OpenAI org-side budget cap also enforces $20/month — double safety.
[vars]
DAILY_CAP_CENTS = "200"
DEFAULT_MODEL = "claude-sonnet-4-6"
# Comma-separated list of origins allowed to call this worker.
# Leave as "*" for development; tighten before going live with kids.
ALLOWED_ORIGINS = "*"

[[kv_namespaces]]
binding = "USAGE"
id = "e8c06bb9c9db4adc875f646a323b0478"

[[kv_namespaces]]
binding = "CACHE"
id = "82cd8fe6398440c99172b7f5fd0ebcba"
